# ==========================================
# RandomItemPVP - 盟友刷怪蛋配置模块
# ==========================================
# 此文件包含盟友刷怪蛋的配置
# ==========================================

# 是否启用盟友刷怪蛋功能
enabled: false

# 游戏进度阈值（边界缩小到多少时开始出现盟友刷怪蛋）
# 例如：0.3 表示边界缩小到初始大小的 30% 时开始出现
# 范围：0.0 - 1.0（0.0 = 游戏开始，1.0 = 游戏结束）
game_progress_threshold: 0.3

# 每个空投箱中盟友刷怪蛋的数量（通常为1）
spawn_eggs_per_airdrop: 1

# ==========================================
# 盟友生物类型和权重配置
# ==========================================
# 权重越高，出现概率越大
# 总权重 = 所有生物权重之和
# 每个生物的概率 = 该生物权重 / 总权重
# ==========================================
allies:
  # 僵尸类
  ZOMBIE: 30
  ZOMBIE_VILLAGER: 20
  HUSK: 25
  DROWNED: 15
  
  # 骷髅类
  SKELETON: 30
  STRAY: 20
  WITHER_SKELETON: 10
  
  # 蜘蛛类
  SPIDER: 25
  CAVE_SPIDER: 20
  
  # 其他敌对生物
  CREEPER: 15
  ENDERMAN: 10
  PILLAGER: 20
  VINDICATOR: 15
  EVOKER: 5
  VEX: 10
  WITCH: 15
  PHANTOM: 10
  
  # 中立生物（也可以作为盟友）
  WOLF: 25
  IRON_GOLEM: 5
  POLAR_BEAR: 10
  
  # 下界生物
  PIGLIN: 20
  PIGLIN_BRUTE: 10
  ZOMBIFIED_PIGLIN: 15
  HOGLIN: 15
  ZOGLIN: 10

# ==========================================
# 盟友生物行为配置
# ==========================================
behavior:
  # 盟友是否会攻击其他玩家（true = 会攻击，false = 只防御）
  attack_players: true
  
  # 盟友是否会攻击其他盟友（true = 会攻击，false = 不会）
  attack_allies: false
  
  # 盟友是否会跟随主人（true = 跟随，false = 不跟随）
  follow_owner: true
  
  # 盟友跟随距离（格数）
  follow_distance: 10
  
  # 盟友攻击范围（格数）
  attack_range: 16
  
  # 盟友生命值倍数（1.0 = 正常，2.0 = 双倍生命值）
  health_multiplier: 1.5
  
  # 盟友攻击力倍数（1.0 = 正常，2.0 = 双倍攻击力）
  damage_multiplier: 1.2



