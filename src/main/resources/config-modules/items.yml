  GLASS: 50                    # 玻璃
  WHITE_WOOL: 45               # 白色羊毛
  GRAY_WOOL: 40                # 灰色羊毛
  LIGHT_GRAY_WOOL: 40          # 浅灰色羊毛
  BROWN_WOOL: 35               # 棕色羊毛
  BLACK_WOOL: 35               # 黑色羊毛
  COBWEB: 40                   # 蜘蛛网
  TORCH: 45                    # 火把
  SOUL_TORCH: 30               # 灵魂火把
  
  # 压力板和按钮（权重 25-35）
  STONE_PRESSURE_PLATE: 30     # 石压力板
  OAK_PRESSURE_PLATE: 25       # 木压力板
