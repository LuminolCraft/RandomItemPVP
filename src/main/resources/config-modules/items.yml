  STONE: 75                    # 石头
  DIRT: 70                     # 泥土
  OAK_PLANKS: 65               # 橡木板
  SPRUCE_PLANKS: 60            # 云杉木板
  BIRCH_PLANKS: 60             # 白桦木板
  ACACIA_PLANKS: 55            # 金合欢木板
  OAK_LOG: 55                  # 橡木原石
  SPRUCE_LOG: 55               # 云杉原木
  COAL_BLOCK: 50               # 煤炭块
  SAND: 55                     # 沙子
  GRAVEL: 50                   # 沙砾
  
  # 建筑方块（权重 35-55）
  STONE_BRICKS: 50             # 石砖
  CRACKED_STONE_BRICKS: 45     # 裂石砖
  COBBLESTONE_WALL: 45         # 圆石墙
  BRICK_BLOCK: 40              # 砖块
  SANDSTONE: 40                # 砂岩
  RED_SANDSTONE: 40            # 红砂岩
  QUARTZ_BLOCK: 35             # 石英块
  PURPUR_BLOCK: 35             # 紫珀块
  PRISMARINE: 35               # 海晶石
  DARK_PRISMARINE: 35          # 暗海晶石
  
