# 地图重置配置
# 此文件控制游戏结束时的地图重置行为

# 是否启用地图重置
enabled: true



# 地图重置的批处理大小（每次处理的方块数量）
# 较大的值会加快重置速度，但可能导致短暂卡顿
batch-size: 1000

# 地图重置的批处理延迟（ticks）
# 较大的值会减少卡顿，但会延长重置时间
delay: 1

# 是否启用地图重置保护
# 启用后，玩家无法在重置区域内破坏方块
protection: true

# 是否启用地图重置数据持久化
# 启用后，地图数据会保存到文件，服务器重启后仍可使用
persistence: true

# 是否在热加载时自动保存初始状态
save-on-load: true

# 是否在游戏结束时自动重置地图
reset-on-game-end: true

# 是否在重置后清理残留的流动水
# 启用后，会清理所有level > 0的WATER方块
post-reset-clear-flowing: true