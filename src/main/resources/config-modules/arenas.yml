# ==========================================
# RandomItemPVP - 固定房间配置模块
# ==========================================
# 此文件用于配置固定的游戏房间
# 插件启动时会自动从该文件加载所有固定房间
# ==========================================

# 重要提示：
# 1. 动态创建房间功能已被禁用，所有房间必须在此文件中配置
# 2. 每个房间可以配置不同的默认地图
# 3. 准备房间位置可以在 maps.yml 中通过 arena_<房间名> 配置

# 固定房间列表
# 格式：
# <房间名>:
#   enabled: true/false  # 是否启用该房间
#   map: <地图ID>         # 默认地图（可选，未设置则使用投票系统）
#   # 注意：其他配置会从地图配置或全局配置继承

# 示例配置：
room1:
  enabled: true
  map: map1  # 使用 maps.yml 中定义的 map1

room2:
  enabled: true
  map: map2  # 使用 maps.yml 中定义的 map2

room3:
  enabled: true
  # 未设置 map，将使用投票系统选择地图

# 更多房间示例...
room4:
  enabled: true
  map: map3  # 使用 maps.yml 中定义的 map3

# 禁用的房间示例
# room5:
#   enabled: false  # 禁用的房间
#   map: map1
