# ==========================================
# RandomItemPVP - 竞技场配置模块
# ==========================================
# 此文件包含竞技场相关的核心设置
# ==========================================

# 世界实例化设置（多房间独立世界支持）
world-instancing:
  enabled: true # 是否启用世界实例化（每个房间使用独立的世界副本）
  auto-cleanup: true # 游戏结束后是否自动删除世界实例（true=删除，false=重置）
  # 注意：Worlds 插件是必需依赖！插件启动时会检查 Worlds 插件，未安装则无法运行
  # 启用后，每个房间会从模板世界复制创建独立的世界实例
  # 这样多个房间可以使用同一个地图模板，但玩家互不干扰
  # auto-cleanup: true  = 游戏结束后删除世界实例（使用 Worlds 插件删除，节省空间，下次游戏重新复制）
  # auto-cleanup: false = 游戏结束后重置世界实例（使用 Worlds 插件重置，保留世界，重置为初始状态）

# 大厅设置（游戏结束后传送玩家回大厅）
lobby:
  enabled: true # 是否启用大厅传送（游戏结束后自动传送）
  world: hub # Worlds 插件的世界 key（必需）
  x: 12 # X坐标
  y: 69 # Y坐标
  z: 18 # Z坐标
  yaw: 0.0 # 视角偏航角
  pitch: 0.0 # 视角俯仰角

# 房间特定的准备房间配置
# 每个房间可以有独立的准备房间位置
# 格式：<房间名>:
#         world: '世界名'
#         x: X坐标
#         y: Y坐标
#         z: Z坐标
#         yaw: 偏航角
#         pitch: 俯仰角
rooms:
  room1:
    world: 'ready'    # Worlds 插件的世界 key（可选，未设置则使用地图的世界）
    x: -91          # X坐标（可选，未设置则使用地图的X坐标）
    y: 25           # Y坐标（可选，未设置则使用地图的Y坐标）
    z: -89          # Z坐标（可选，未设置则使用地图的Z坐标）
    yaw: 0.0          # 视角偏航角（可选，未设置则使用地图的yaw）
    pitch: 0.0        # 视角俯仰角（可选，未设置则使用地图的pitch）
  room2:
    world: 'ready'    # Worlds 插件的世界 key（可选，未设置则使用地图的世界）
    x: -80            # X坐标（可选，未设置则使用地图的X坐标）
    y: 3          # Y坐标（可选，未设置则使用地图的Y坐标）
    z: 17            # Z坐标（可选，未设置则使用地图的Z坐标）
    yaw: 0.0          # 视角偏航角（可选，未设置则使用地图的yaw）
    pitch: 0.0        # 视角俯仰角（可选，未设置则使用地图的pitch）
  room3:
    world: 'ready'    # Worlds 插件的世界 key（可选，未设置则使用地图的世界）
    x: 5         # X坐标（可选，未设置则使用地图的X坐标）
    y: -57           # Y坐标（可选，未设置则使用地图的Y坐标）
    z: 7         # Z坐标（可选，未设置则使用地图的Z坐标）
    yaw: 0.0          # 视角偏航角（可选，未设置则使用地图的yaw）
    pitch: 0.0        # 视角俯仰角（可选，未设置则使用地图的pitch）
  room4:
    world: 'ready'    # Worlds 插件的世界 key（可选，未设置则使用地图的世界）
    x: 8         # X坐标（可选，未设置则使用地图的X坐标）
    y: 40           # Y坐标（可选，未设置则使用地图的Y坐标）
    z: 8         # Z坐标（可选，未设置则使用地图的Z坐标）
    yaw: 0.0          # 视角偏航角（可选，未设置则使用地图的yaw）
    pitch: 0.0        # 视角俯仰角（可选，未设置则使用地图的pitch）


